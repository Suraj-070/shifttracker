<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>You're offline — ShiftTracker</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #18181b;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0a0a0a; color: #fafafa; }
    .card { background: #18181b; }
    .sub { color: #a1a1aa; }
  }
  .wrap { text-align: center; max-width: 360px; padding: 24px; }
  .badge {
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, #10b981, #047857);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
  p.sub { color: #71717a; font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
  button {
    background: #10b981; color: white; border: none;
    padding: 10px 20px; border-radius: 10px; font-size: 14px;
    font-weight: 500; cursor: pointer;
  }
  button:active { opacity: 0.85; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="badge">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    </div>
    <h1>You're offline</h1>
    <p class="sub">ShiftTracker needs a connection to load or save your shifts. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
